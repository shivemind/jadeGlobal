type: http
name: Trigger an automation run for a given suite and environment
url: '{{baseUrl}}/test-runs'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "suiteId": "dc2d3ecf-ac3c-5a59-9896-5f40f22f0743",
      "environment": "preprod",
      "releaseVersion": "string",
      "triggeredBy": "string",
      "runMode": "full"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "runId": "59661597-719c-b4cd-fce1-1fa1835e550c",
            "suiteId": "182fc88b-3f9f-9f10-5d9c-aa0283ca738d",
            "status": "running",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "1992-08-19T18:16:38.025Z",
            "finishedAt": "1973-12-26T04:45:01.951Z",
            "passedCount": 2087,
            "failedCount": 1189,
            "flakyCount": 9210
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run started
