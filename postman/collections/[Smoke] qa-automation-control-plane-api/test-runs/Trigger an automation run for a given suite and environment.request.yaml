type: http
name: Trigger an automation run for a given suite and environment
url: '{{baseUrl}}/test-runs'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "suiteId": "8d33fe20-d3ce-7928-c5a8-971e6be3d28c",
      "environment": "qa",
      "releaseVersion": "string",
      "triggeredBy": "string",
      "runMode": "smoke"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "runId": "a94a49e0-e898-d061-e9dd-a9e7e1637436",
            "suiteId": "b1133b50-e1e2-3ac0-e608-8f3f8ca0e637",
            "status": "running",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "2010-11-14T13:38:32.152Z",
            "finishedAt": "2023-08-05T18:19:34.105Z",
            "passedCount": 6642,
            "failedCount": 6994,
            "flakyCount": 652
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run started
