type: http
name: Fetch a summary report for a completed run
url: '{{baseUrl}}/test-runs/:runId/report'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: a2c3f058-b08b-eb51-32df-1ae2bb8d6ccd
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "34620728-ef91-bf96-a8f1-721e9de4c8c3",
            "qualityGate": "pass",
            "defectLeakageRisk": "medium",
            "summary": "string",
            "topFailures": [
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              },
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Run report
