type: http
name: Create a shipment for a reserved order
url: '{{baseUrl}}/orders/:orderId/shipments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 5eb77709-2010-2a04-e74a-abb2328f9844
body:
  type: json
  content: |-
    {
      "carrier": "string",
      "shipFrom": "string",
      "trackingReference": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "shipmentId": "58ca9ce2-cab2-6d7a-bf2b-06714ba5e743",
            "carrier": "string",
            "shipFrom": "string",
            "trackingReference": "string",
            "status": "delivered"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Shipment created
