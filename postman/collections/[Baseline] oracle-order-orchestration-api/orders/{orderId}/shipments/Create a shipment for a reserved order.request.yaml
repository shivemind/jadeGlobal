type: http
name: Create a shipment for a reserved order
url: '{{baseUrl}}/orders/:orderId/shipments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: c689819b-efbe-5c17-4fc6-3c8beedcca98
body:
  type: json
  content: |-
    {
      "carrier": "string",
      "shipFrom": "string",
      "trackingReference": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "shipmentId": "87b87234-2dc1-374f-cfab-03d512f10216",
            "carrier": "string",
            "shipFrom": "string",
            "trackingReference": "string",
            "status": "delivered"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Shipment created
