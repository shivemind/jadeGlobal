type: http
name: Reserve inventory for a confirmed order
url: '{{baseUrl}}/orders/:orderId/reserve-inventory'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: c689819b-efbe-5c17-4fc6-3c8beedcca98
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "actionId": "9024405e-5d4c-c445-cefa-dc95ecf62e3d",
            "orderId": "9a33498c-6030-eec3-8665-be80a992d898",
            "status": "running",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory reservation requested
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 4384
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory cannot be reserved
