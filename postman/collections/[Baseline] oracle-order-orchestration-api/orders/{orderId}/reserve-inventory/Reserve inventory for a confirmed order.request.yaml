type: http
name: Reserve inventory for a confirmed order
url: '{{baseUrl}}/orders/:orderId/reserve-inventory'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 5eb77709-2010-2a04-e74a-abb2328f9844
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "actionId": "f98909f9-c030-3f79-44ea-2452183311ad",
            "orderId": "545b4884-2596-d696-e24d-d7f5556f71b7",
            "status": "completed",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory reservation requested
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 9924
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory cannot be reserved
