type: http
name: Reserve inventory for a confirmed order
url: '{{baseUrl}}/orders/:orderId/reserve-inventory'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: fc88fe3b-0381-5108-41d9-c5ac1ce1ca84
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "actionId": "ba8bb7fa-9d30-266a-9bb9-6d9cb0d50494",
            "orderId": "165442f8-172c-3004-cd49-bbf3823edf8e",
            "status": "queued",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory reservation requested
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2492
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory cannot be reserved
