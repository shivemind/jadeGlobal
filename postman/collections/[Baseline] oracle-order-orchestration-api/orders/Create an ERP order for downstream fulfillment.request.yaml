type: http
name: Create an ERP order for downstream fulfillment
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "string",
      "orderDate": "1962-06-20",
      "currency": "USD",
      "lineItems": [
        {
          "sku": "string",
          "quantity": 4520,
          "unitPrice": 7412.912544287477,
          "warehouseCode": "string"
        }
      ],
      "sourceSystem": "salesforce"
    }
