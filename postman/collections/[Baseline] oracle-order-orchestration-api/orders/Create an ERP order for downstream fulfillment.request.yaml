type: http
name: Create an ERP order for downstream fulfillment
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "string",
      "orderDate": "1986-04-08",
      "currency": "USD",
      "lineItems": [
        {
          "sku": "string",
          "quantity": 5964,
          "unitPrice": 3887.1983967695332,
          "warehouseCode": "string"
        }
      ],
      "sourceSystem": "salesforce"
    }
