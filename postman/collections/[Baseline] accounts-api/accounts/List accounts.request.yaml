type: http
name: List accounts
url: '{{baseUrl}}/accounts'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "name": "string",
              "type": "investment",
              "balance": 1426.6459671433984,
              "currency": "string",
              "status": "active",
              "createdAt": "1978-05-31T02:14:30.771Z"
            },
            {
              "id": "string",
              "name": "string",
              "type": "savings",
              "balance": 480.7420476430213,
              "currency": "string",
              "status": "suspended",
              "createdAt": "1982-09-09T15:53:35.972Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
