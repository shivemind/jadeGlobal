type: http
name: List accounts
url: '{{baseUrl}}/accounts'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "name": "string",
              "type": "investment",
              "balance": 2149.5833628755513,
              "currency": "string",
              "status": "active",
              "createdAt": "1998-11-13T13:33:31.765Z"
            },
            {
              "id": "string",
              "name": "string",
              "type": "checking",
              "balance": 6194.390245857579,
              "currency": "string",
              "status": "active",
              "createdAt": "1957-09-07T08:50:34.003Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
