type: http
name: List accounts
url: '{{baseUrl}}/accounts'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "name": "string",
              "type": "savings",
              "balance": 6532.567817894004,
              "currency": "string",
              "status": "suspended",
              "createdAt": "2021-07-31T02:25:56.780Z"
            },
            {
              "id": "string",
              "name": "string",
              "type": "investment",
              "balance": 5462.935380999279,
              "currency": "string",
              "status": "suspended",
              "createdAt": "2001-06-01T05:25:54.373Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
