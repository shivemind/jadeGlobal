type: http
name: Get an account by ID
url: '{{baseUrl}}/accounts/:accountId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: accountId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "name": "string",
            "type": "checking",
            "balance": 3239.7965169425124,
            "currency": "string",
            "status": "suspended",
            "createdAt": "1956-02-29T18:46:00.206Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: OK
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Not found
