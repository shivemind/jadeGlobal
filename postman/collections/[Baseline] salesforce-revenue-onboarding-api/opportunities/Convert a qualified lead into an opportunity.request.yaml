type: http
name: Convert a qualified lead into an opportunity
url: '{{baseUrl}}/opportunities'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "leadId": "3acd2c7a-c29a-1ea7-4eee-f66d419b5cca",
      "accountName": "string",
      "amount": 7224.121404685077,
      "expectedCloseDate": "1946-07-15",
      "productFamily": "string",
      "billingModel": "hybrid"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "opportunityId": "21e08bab-5dea-b38a-3e7c-c5dba95d274e",
            "accountName": "string",
            "stage": "close_won",
            "amount": 4583.592632857958,
            "expectedCloseDate": "1994-02-19"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Opportunity created
