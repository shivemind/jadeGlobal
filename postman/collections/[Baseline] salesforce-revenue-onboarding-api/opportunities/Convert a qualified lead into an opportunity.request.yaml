type: http
name: Convert a qualified lead into an opportunity
url: '{{baseUrl}}/opportunities'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "leadId": "421431d6-38b1-426b-3482-d350738e0e4c",
