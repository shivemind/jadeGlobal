      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "opportunityId": "91644a16-049f-031d-cbdd-74626ee045ee",
            "accountName": "string",
            "stage": "close_won",
            "amount": 5288.2404861251935,
            "expectedCloseDate": "1949-05-19"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Opportunity created
