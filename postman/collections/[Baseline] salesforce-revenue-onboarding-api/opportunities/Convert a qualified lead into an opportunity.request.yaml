      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "opportunityId": "930276bd-ea3c-9d99-13da-12c38dbc5680",
            "accountName": "string",
            "stage": "legal_review",
            "amount": 354.52143411881076,
            "expectedCloseDate": "2009-11-10"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Opportunity created
