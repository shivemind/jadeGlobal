type: http
name: Mark an opportunity as close-won and trigger onboarding
url: '{{baseUrl}}/opportunities/:opportunityId/close-won'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: opportunityId
    value: d07839b0-80f1-139d-690f-566715c686de
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "runId": "2d42fa70-d396-e5cc-5614-332d90cd4027",
            "workflowName": "customer-onboarding",
            "status": "failed",
            "customerId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Close-won workflow started
