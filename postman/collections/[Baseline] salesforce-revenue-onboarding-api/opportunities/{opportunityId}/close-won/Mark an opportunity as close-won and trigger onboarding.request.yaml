type: http
name: Mark an opportunity as close-won and trigger onboarding
url: '{{baseUrl}}/opportunities/:opportunityId/close-won'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: opportunityId
    value: ec5b9fca-0aa3-361d-941d-a6a08a865d9f
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "runId": "efb4eadd-c962-ed7e-5297-51e9eafa9c3a",
            "workflowName": "customer-onboarding",
            "status": "queued",
            "customerId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Close-won workflow started
