type: http
name: Capture a new inbound lead
url: '{{baseUrl}}/leads'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "email": "8xFuk1pAHtB7@X.qk",
      "company": "string",
      "source": "webinar",
      "interestArea": "revenue-operations"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "leadId": "fcfdc1db-05b6-6e12-8b7c-1d541e557335",
            "status": "working",
            "score": 1526,
            "owner": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Lead created
