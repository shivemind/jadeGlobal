type: http
name: Capture a new inbound lead
url: '{{baseUrl}}/leads'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "email": "JmsQnaTcq@BXaKmND.dhhy",
      "company": "string",
      "source": "webinar",
      "interestArea": "revenue-operations"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "leadId": "ba4df14b-fa04-3c73-a004-89f6ccca72f5",
            "status": "new",
            "score": 2930,
            "owner": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Lead created
