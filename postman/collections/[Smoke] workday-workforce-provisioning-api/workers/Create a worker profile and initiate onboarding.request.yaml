type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "qSAOtRq4EkOr7O@VbrfuXFwklfzVawzf.exg",
      "department": "string",
      "startDate": "2024-07-22",
      "managerId": "string",
      "location": "string",
      "employmentType": "employee"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "86d1cc04-63b3-f9d9-5cb6-966129aa850c",
            "employeeNumber": "string",
            "status": "leave",
            "department": "string",
            "location": "string",
            "startDate": "2004-02-13",
            "onboardingState": "initiated"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
