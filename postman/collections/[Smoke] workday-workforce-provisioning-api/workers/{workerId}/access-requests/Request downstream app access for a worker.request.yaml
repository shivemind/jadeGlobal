type: http
name: Request downstream app access for a worker
url: '{{baseUrl}}/workers/:workerId/access-requests'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: a33c8b22-bc6c-6a54-3a73-65186f1df7ec
body:
  type: json
  content: |-
    {
      "systemName": "salesforce",
      "roleName": "string",
      "justification": "string",
      "requestedBy": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "ticketId": "405d17ee-4c67-68e1-f3e2-7c2ec262e134",
            "workerId": "64af6b66-fa1a-e65b-6bfd-3864d391db25",
            "systemName": "string",
            "status": "provisioning"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Access request created
