type: http
name: Fetch a summary report for a completed run
url: '{{baseUrl}}/test-runs/:runId/report'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: ae8297d5-50bd-42d8-1d51-4763f4ad23f4
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "f1a28abc-40a3-1a4f-cc5d-d17e09a2ace6",
            "qualityGate": "pass",
            "defectLeakageRisk": "low",
            "summary": "string",
            "topFailures": [
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              },
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Run report
