type: http
name: Fetch a summary report for a completed run
url: '{{baseUrl}}/test-runs/:runId/report'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: c3857a1e-1b6c-45f8-4b7d-aab55edabeed
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "c9c6663c-3359-e012-6a50-1d45de211849",
            "qualityGate": "fail",
            "defectLeakageRisk": "low",
            "summary": "string",
            "topFailures": [
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              },
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Run report
