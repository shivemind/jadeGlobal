type: http
name: Get status and metrics for a test run
url: '{{baseUrl}}/test-runs/:runId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: ae8297d5-50bd-42d8-1d51-4763f4ad23f4
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "d8eeb4d0-f779-082c-0387-7e1d39964715",
            "suiteId": "d48e87de-94b1-8a33-1368-c77ab14e637f",
            "status": "queued",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "1999-01-15T17:12:33.254Z",
            "finishedAt": "2010-02-20T10:40:34.292Z",
            "passedCount": 2959,
            "failedCount": 3460,
            "flakyCount": 3372
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 1112
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run not found
