type: http
name: Get status and metrics for a test run
url: '{{baseUrl}}/test-runs/:runId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: c3857a1e-1b6c-45f8-4b7d-aab55edabeed
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "631080d8-b1be-53cb-0575-f4b93a33e9a6",
            "suiteId": "ed50ed9d-e5f8-c601-c636-fc3b832807f3",
            "status": "passed",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "2002-10-01T00:07:59.830Z",
            "finishedAt": "1955-11-20T15:46:31.638Z",
            "passedCount": 3882,
            "failedCount": 8068,
            "flakyCount": 7987
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 5977
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run not found
