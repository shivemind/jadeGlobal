type: http
name: Convert a qualified lead into an opportunity
url: '{{baseUrl}}/opportunities'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "leadId": "0325b8d4-04bd-256a-ecc2-81a088902e2e",
      "accountName": "string",
      "amount": 7404.192900005155,
      "expectedCloseDate": "1994-06-25",
      "productFamily": "string",
      "billingModel": "usage"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "opportunityId": "4386b738-9252-80b5-b418-dc09bda986cc",
            "accountName": "string",
            "stage": "close_lost",
            "amount": 9784.86402290729,
            "expectedCloseDate": "2014-11-09"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Opportunity created
