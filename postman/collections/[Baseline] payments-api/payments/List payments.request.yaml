type: http
name: List payments
url: '{{baseUrl}}/payments'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "amount": 4636.012179185595,
              "currency": "string",
              "status": "completed",
              "createdAt": "2019-08-09T20:15:42.566Z"
            },
            {
              "id": "string",
              "amount": 2011.4974229414017,
              "currency": "string",
              "status": "pending",
              "createdAt": "2009-11-27T05:01:29.712Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
