type: http
name: List payments
url: '{{baseUrl}}/payments'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "amount": 1456.8863827725731,
              "currency": "string",
              "status": "completed",
              "createdAt": "1972-08-14T17:58:09.781Z"
            },
            {
              "id": "string",
              "amount": 784.3937322678873,
              "currency": "string",
              "status": "completed",
              "createdAt": "1958-05-02T21:34:35.206Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
