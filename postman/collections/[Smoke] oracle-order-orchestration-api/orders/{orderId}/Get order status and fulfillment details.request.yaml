type: http
name: Get order status and fulfillment details
url: '{{baseUrl}}/orders/:orderId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 4a203215-b00f-0cdd-3cb9-c60bf4053cf3
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "c670e324-6f6a-82e6-f8ef-3cc8ab207d9f",
            "customerId": "string",
            "sourceSystem": "string",
            "orderDate": "2017-01-16",
            "currency": "string",
            "status": "partially_shipped",
            "totalAmount": 9969.757307969978,
            "lineItems": [
              {
                "sku": "string",
                "quantity": 5699,
                "unitPrice": 983.3441243313313,
                "warehouseCode": "string"
              },
              {
                "sku": "string",
                "quantity": 4983,
                "unitPrice": 1718.7657077445206,
                "warehouseCode": "string"
              }
            ],
            "shipments": [
              {
                "shipmentId": "f3eacffc-b0d1-de0d-4da5-655a58db6c6a",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "delivered"
              },
              {
                "shipmentId": "33d04d99-b901-080e-a835-84564b5f04d1",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "created"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 3498
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order not found
