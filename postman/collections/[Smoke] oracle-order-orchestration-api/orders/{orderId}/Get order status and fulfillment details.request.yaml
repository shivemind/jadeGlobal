type: http
name: Get order status and fulfillment details
url: '{{baseUrl}}/orders/:orderId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 3d6532a1-8820-0d9b-3294-84614cd5d6cc
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "6058fdf3-47d3-0489-bf8b-9d4ad95d7866",
            "customerId": "string",
            "sourceSystem": "string",
            "orderDate": "1998-04-17",
            "currency": "string",
            "status": "partially_shipped",
            "totalAmount": 5548.702138277066,
            "lineItems": [
              {
                "sku": "string",
                "quantity": 5548,
                "unitPrice": 2500.509762412495,
                "warehouseCode": "string"
              },
              {
                "sku": "string",
                "quantity": 9478,
                "unitPrice": 4319.431157817652,
                "warehouseCode": "string"
              }
            ],
            "shipments": [
              {
                "shipmentId": "4900922b-eeeb-47b3-2cb7-8a787c641ea5",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "created"
              },
              {
                "shipmentId": "42e2d6e2-3d65-a4fc-6c17-92460e1c282b",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "delivered"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 4242
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order not found
