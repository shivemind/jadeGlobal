type: http
name: Create a shipment for a reserved order
url: '{{baseUrl}}/orders/:orderId/shipments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 3d6532a1-8820-0d9b-3294-84614cd5d6cc
body:
  type: json
  content: |-
    {
      "carrier": "string",
      "shipFrom": "string",
      "trackingReference": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "shipmentId": "92e3baca-1a93-b010-6ed3-4919612d82b8",
            "carrier": "string",
            "shipFrom": "string",
            "trackingReference": "string",
            "status": "created"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Shipment created
