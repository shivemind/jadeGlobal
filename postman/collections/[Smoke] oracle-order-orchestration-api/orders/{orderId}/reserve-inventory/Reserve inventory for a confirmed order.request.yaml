type: http
name: Reserve inventory for a confirmed order
url: '{{baseUrl}}/orders/:orderId/reserve-inventory'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 3d6532a1-8820-0d9b-3294-84614cd5d6cc
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "actionId": "0e75d1b9-9dd7-c8cc-5b5d-7b5bbd084fae",
            "orderId": "0caa18d9-8d16-30e1-a01e-86a7e1909224",
            "status": "failed",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory reservation requested
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 4242
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory cannot be reserved
