type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "AADeeXpe3q31UC2@BKAqEPumSbogfOyXzErjEkiWWeE.nn",
      "department": "string",
      "startDate": "1966-03-02",
      "managerId": "string",
      "location": "string",
      "employmentType": "contractor"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "b7785983-4428-17ca-289e-3d8f51e7dc6c",
            "employeeNumber": "string",
            "status": "active",
            "department": "string",
            "location": "string",
            "startDate": "1989-08-31",
            "onboardingState": "provisioned"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
