type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "EkdPL5RL0c6mL@EdXBDyPygTHuYgsxapXcj.mm",
      "department": "string",
      "startDate": "1980-10-07",
      "managerId": "string",
      "location": "string",
      "employmentType": "employee"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "03d98bb9-acfc-6d05-fece-adb84df3211e",
            "employeeNumber": "string",
            "status": "terminated",
            "department": "string",
            "location": "string",
            "startDate": "1999-09-16",
            "onboardingState": "initiated"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
