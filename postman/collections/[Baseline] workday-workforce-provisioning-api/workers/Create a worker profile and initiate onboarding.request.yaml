type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "upCudq@BCqL.zl",
      "department": "string",
      "startDate": "1993-12-16",
      "managerId": "string",
      "location": "string",
      "employmentType": "employee"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "a76af1ed-c8c5-53a4-d697-6c2d2986d47f",
            "employeeNumber": "string",
            "status": "prehire",
            "department": "string",
            "location": "string",
            "startDate": "1997-09-17",
            "onboardingState": "completed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
