type: http
name: Request downstream app access for a worker
url: '{{baseUrl}}/workers/:workerId/access-requests'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 061f3bb9-b6c0-1fc8-bb63-ba756c2f4f71
body:
  type: json
  content: |-
    {
      "systemName": "salesforce",
      "roleName": "string",
      "justification": "string",
      "requestedBy": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "ticketId": "2e110d28-f241-9ac4-523f-fd762c3856f1",
            "workerId": "e6794a3d-5813-eec2-f05b-2c2a196c6fac",
            "systemName": "string",
            "status": "awaiting_approval"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Access request created
