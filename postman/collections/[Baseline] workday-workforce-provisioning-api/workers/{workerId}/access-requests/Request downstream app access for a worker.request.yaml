type: http
name: Request downstream app access for a worker
url: '{{baseUrl}}/workers/:workerId/access-requests'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 2831a0c1-26b5-8f21-9b30-2d795eedcb9f
body:
  type: json
  content: |-
    {
      "systemName": "salesforce",
      "roleName": "string",
      "justification": "string",
      "requestedBy": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "ticketId": "1b067bb7-19d7-c0a3-9e45-ddc7473a3677",
            "workerId": "2be5e63d-bd62-b40a-1996-2ab9328a8869",
            "systemName": "string",
            "status": "completed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Access request created
