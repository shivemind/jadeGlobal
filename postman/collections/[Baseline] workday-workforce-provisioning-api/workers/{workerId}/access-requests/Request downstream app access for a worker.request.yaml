type: http
name: Request downstream app access for a worker
url: '{{baseUrl}}/workers/:workerId/access-requests'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: ac96d861-8325-9a2a-3c85-1b0571174b7e
body:
  type: json
  content: |-
    {
      "systemName": "salesforce",
      "roleName": "string",
      "justification": "string",
      "requestedBy": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "ticketId": "87e32f14-ab2f-7342-26c8-efb52239d734",
            "workerId": "de092f54-7e95-1c4b-2265-cfcbd9a30fd1",
            "systemName": "string",
            "status": "failed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Access request created
