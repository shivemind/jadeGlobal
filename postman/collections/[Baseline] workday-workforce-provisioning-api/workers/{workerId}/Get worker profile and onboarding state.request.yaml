type: http
name: Get worker profile and onboarding state
url: '{{baseUrl}}/workers/:workerId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 061f3bb9-b6c0-1fc8-bb63-ba756c2f4f71
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "workerId": "a76af1ed-c8c5-53a4-d697-6c2d2986d47f",
            "employeeNumber": "string",
            "status": "prehire",
            "department": "string",
            "location": "string",
            "startDate": "1997-09-17",
            "onboardingState": "completed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker details
