type: http
name: Get worker profile and onboarding state
url: '{{baseUrl}}/workers/:workerId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 2831a0c1-26b5-8f21-9b30-2d795eedcb9f
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "workerId": "03d98bb9-acfc-6d05-fece-adb84df3211e",
            "employeeNumber": "string",
            "status": "terminated",
            "department": "string",
            "location": "string",
            "startDate": "1999-09-16",
            "onboardingState": "initiated"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker details
