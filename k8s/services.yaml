        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          value: payments-api
        - name: PORT
          value: "8080"
        - name: DOWNSTREAM_URLS
          value: "http://accounts-api.jade-global.svc.cluster.local/accounts"
        - name: POSTMAN_INSIGHTS_SYSTEM_ENV
          value: "936898ce-cf73-4feb-827e-8a0e9d5e695e"
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: jade-global
spec:
  selector:
    app: payments-api
  ports:
  - port: 80
    targetPort: 8080
---
