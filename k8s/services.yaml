apiVersion: v1
kind: Namespace
metadata:
  name: jade-global
---
# ─── accounts-api (leaf service, no downstream) ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-api
  namespace: jade-global
  labels:
    app: accounts-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts-api
  template:
    metadata:
      labels:
        app: accounts-api
    spec:
      containers:
      - name: accounts-api
        image: jade-mock-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          value: accounts-api
        - name: PORT
          value: "8080"
        - name: DOWNSTREAM_URLS
          value: ""
        - name: POSTMAN_INSIGHTS_SYSTEM_ENV
          value: "936898ce-cf73-4feb-827e-8a0e9d5e695e"
---
apiVersion: v1
kind: Service
metadata:
  name: accounts-api
  namespace: jade-global
spec:
  selector:
    app: accounts-api
  ports:
  - port: 80
    targetPort: 8080
---
# ─── payments-api → accounts-api ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: jade-global
  labels:
    app: payments-api
spec:
  replicas: 1
