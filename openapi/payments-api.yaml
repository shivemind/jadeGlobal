openapi: 3.0.3
info:
  title: Payments API
  version: 1.4.2
  description: Core banking payments service
  x-postman-insights:
    cluster-name: core-banking-cluster
    dependencies:
      - accounts-api
servers:
  - url: https://stage-api.example.com/payments
    description: Stage
  - url: https://api.example.com/payments
    description: Production
paths:
  /payments:
    get:
      operationId: listPayments
      summary: List payments
      parameters:
        - $ref: "#/components/parameters/Traceparent"
      responses:
        "200":
          description: OK
          headers:
            traceparent:
              $ref: "#/components/headers/Traceparent"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      summary: Create a payment
      parameters:
        - $ref: "#/components/parameters/Traceparent"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "201":
          description: Created
          headers:
            traceparent:
              $ref: "#/components/headers/Traceparent"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
  /payments/{paymentId}:
    get:
      operationId: getPayment
      summary: Get a payment by ID
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Traceparent"
      responses:
        "200":
          description: OK
          headers:
            traceparent:
              $ref: "#/components/headers/Traceparent"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Not found
components:
  parameters:
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
      schema:
        type: string
        pattern: "^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$"
        example: "00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01"
  headers:
    Traceparent:
      description: W3C Trace Context header propagated on responses for correlation.
      schema:
        type: string
        pattern: "^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$"
  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
          format: date-time
    PaymentRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: double
        currency:
          type: string
