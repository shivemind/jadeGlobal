openapi: 3.0.3
info:
  title: QA Automation Control Plane API
  version: 1.0.0
  description: >
    Sample API for triggering, tracking, and reporting enterprise QA automation
    runs across applications, environments, and release trains.
servers:
  - url: https://stage-api.example.com/qa-control
    description: Stage
  - url: https://api.example.com/qa-control
    description: Production
tags:
  - name: Suites
  - name: Runs
  - name: Reports
paths:
  /test-suites:
    get:
      operationId: listTestSuites
      summary: List available automated test suites
      tags: [Suites]
      responses:
        "200":
          description: Test suites
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TestSuite"
  /test-runs:
    post:
      operationId: createTestRun
      summary: Trigger an automation run for a given suite and environment
      tags: [Runs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestRunRequest"
      responses:
        "201":
          description: Test run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
  /test-runs/{runId}:
    get:
      operationId: getTestRun
      summary: Get status and metrics for a test run
      tags: [Runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Test run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          description: Test run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /test-runs/{runId}/report:
    get:
      operationId: getTestReport
      summary: Fetch a summary report for a completed run
      tags: [Reports]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestReport"
components:
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    TestSuite:
      type: object
      properties:
        suiteId:
          type: string
          format: uuid
        name:
          type: string
        application:
          type: string
        type:
          type: string
          enum: [api, ui, integration, performance, security]
        owner:
          type: string
    CreateTestRunRequest:
      type: object
      required:
        - suiteId
        - environment
        - releaseVersion
      properties:
        suiteId:
          type: string
          format: uuid
        environment:
          type: string
          enum: [dev, qa, uat, preprod]
        releaseVersion:
          type: string
        triggeredBy:
          type: string
        runMode:
          type: string
          enum: [smoke, regression, full]
    TestRun:
      type: object
      properties:
        runId:
          type: string
          format: uuid
        suiteId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, passed, failed, cancelled]
        environment:
          type: string
        releaseVersion:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        passedCount:
          type: integer
        failedCount:
          type: integer
        flakyCount:
          type: integer
    TestReport:
      type: object
      properties:
        runId:
          type: string
          format: uuid
        qualityGate:
          type: string
          enum: [pass, review, fail]
        defectLeakageRisk:
          type: string
          enum: [low, medium, high]
        summary:
          type: string
        topFailures:
          type: array
          items:
            type: object
            properties:
              testName:
                type: string
              failureReason:
                type: string
              defectId:
                type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
