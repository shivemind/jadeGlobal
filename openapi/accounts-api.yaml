openapi: 3.0.3
info:
  title: Accounts API
  version: 2.1.0
  description: Core banking accounts service
  x-postman-insights:
    cluster-name: core-banking-cluster
    dependencies: []
servers:
  - url: https://stage-api.example.com/accounts
    description: Stage
  - url: https://api.example.com/accounts
    description: Production
paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: List accounts
      parameters:
        - $ref: "#/components/parameters/Traceparent"
      responses:
        "200":
          description: OK
          headers:
            traceparent:
              $ref: "#/components/headers/Traceparent"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      summary: Create an account
      parameters:
        - $ref: "#/components/parameters/Traceparent"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountRequest"
      responses:
        "201":
          description: Created
          headers:
            traceparent:
              $ref: "#/components/headers/Traceparent"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
  /accounts/{accountId}:
    get:
      operationId: getAccount
      summary: Get an account by ID
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Traceparent"
      responses:
        "200":
          description: OK
          headers:
            traceparent:
              $ref: "#/components/headers/Traceparent"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
components:
  parameters:
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
      schema:
        type: string
        pattern: "^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$"
        example: "00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01"
  headers:
    Traceparent:
      description: W3C Trace Context header propagated on responses for correlation.
      schema:
        type: string
        pattern: "^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$"
  schemas:
    Account:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [checking, savings, investment]
        balance:
          type: number
          format: double
        currency:
          type: string
        status:
          type: string
          enum: [active, suspended, closed]
        createdAt:
          type: string
          format: date-time
    AccountRequest:
      type: object
      required: [name, type, currency]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [checking, savings, investment]
        currency:
          type: string
