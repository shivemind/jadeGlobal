name: insights-onboarding

on:
  workflow_dispatch:
    inputs:
      target_service:
        description: "Optional: single service_key to onboard (blank = all)"
        required: false
        type: string

permissions:
  contents: read

env:
  MANIFEST_PATH: postman-services.json

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_services: ${{ steps.build.outputs.has_services }}
    steps:
      - uses: actions/checkout@v4
      - id: build
        shell: bash
        run: |
          set -euo pipefail
          target="${{ inputs.target_service }}"
          if [[ -n "${target}" ]]; then
            filtered="$(jq -c --arg key "${target}" \
              '[.services[] | select(.service_key == $key and .enable_insights == true)]' \
              "${MANIFEST_PATH}")"
          else
            filtered="$(jq -c '[.services[] | select(.enable_insights == true)]' \
              "${MANIFEST_PATH}")"
          fi
          count="$(jq 'length' <<<"${filtered}")"
          if [[ "${count}" -eq 0 ]]; then
            echo "has_services=false" >> "${GITHUB_OUTPUT}"
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "has_services=true" >> "${GITHUB_OUTPUT}"
          echo "matrix=$(jq -c '{include: .}' <<<"${filtered}")" >> "${GITHUB_OUTPUT}"
          echo "Processing ${count} services for Insights onboarding"

  onboard:
    needs: plan
    if: needs.plan.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve IDs from manifest
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          service_key="${{ matrix.service_key }}"
          workspace_id="${{ matrix.workspace_id }}"
          prod_env_id="$(jq -r --arg key "${service_key}" \
            '.services[] | select(.service_key == $key) | .environment_uids.prod // empty' \
            "${MANIFEST_PATH}")"
          system_env="$(jq -r '.system_env // empty' "${MANIFEST_PATH}")"

          echo "workspace_id=${workspace_id}" >> "${GITHUB_OUTPUT}"
          echo "prod_env_id=${prod_env_id}" >> "${GITHUB_OUTPUT}"
          echo "system_env=${system_env}" >> "${GITHUB_OUTPUT}"

          echo "Service:      ${service_key}"
          echo "Workspace:    ${workspace_id}"
          echo "Prod env UID: ${prod_env_id}"
          echo "System env:   ${system_env}"

      - name: Get verification token via Bifrost (akita)
        id: get_token
        shell: bash
        env:
          POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          workspace_id="${{ steps.resolve.outputs.workspace_id }}"

          echo "Fetching team verification token for workspace ${workspace_id}..."
          VERIFICATION_TOKEN=$(curl -sf \
            "https://bifrost-https-v4.gw.postman.com/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: ${POSTMAN_ACCESS_TOKEN}" \
            -d "{\"service\":\"akita\",\"method\":\"GET\",\"path\":\"/v2/workspaces/${workspace_id}/team-verification-token\",\"body\":{}}" \
            | jq -r '.team_verification_token // empty' 2>/dev/null || true)

          if [[ -n "${VERIFICATION_TOKEN}" ]]; then
            echo "Got verification token: ${VERIFICATION_TOKEN:0:10}..."
            echo "token=${VERIFICATION_TOKEN}" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::Could not retrieve verification token"
            echo "token=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Acknowledge workspace via Bifrost (akita)
        id: acknowledge
        shell: bash
        env:
          POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          workspace_id="${{ steps.resolve.outputs.workspace_id }}"

          echo "Acknowledging workspace ${workspace_id}..."
          ACK_RESULT=$(curl -sf \
            "https://bifrost-https-v4.gw.postman.com/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: ${POSTMAN_ACCESS_TOKEN}" \
            -X POST \
            -d "{\"service\":\"akita\",\"method\":\"POST\",\"path\":\"/v2/workspaces/${workspace_id}/onboarding/acknowledge\",\"body\":{}}" \
            2>/dev/null || echo '{"error":"failed"}')

          echo "Acknowledge result: ${ACK_RESULT}"
          echo "ack_status=done" >> "${GITHUB_OUTPUT}"

      - name: Create application binding (observability API)
        id: bind
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          set -euo pipefail
          workspace_id="${{ steps.resolve.outputs.workspace_id }}"
          system_env="${{ steps.resolve.outputs.system_env }}"

          echo "Creating application binding: workspace=${workspace_id} system_env=${system_env}"
          APP_RESULT=$(curl -sf \
            "https://api.observability.postman.com/v2/agent/api-catalog/workspaces/${workspace_id}/applications" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${POSTMAN_API_KEY}" \
            -H "x-postman-env: production" \
            -X POST \
            -d "{\"system_env\":\"${system_env}\"}" \
            2>/dev/null || echo '{"error":"failed"}')

          echo "Application binding result: ${APP_RESULT}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Insights Onboarding: ${{ matrix.service_key }}"
            echo "- Workspace: \`${{ steps.resolve.outputs.workspace_id }}\`"
            echo "- Prod env:  \`${{ steps.resolve.outputs.prod_env_id }}\`"
            echo "- System env: \`${{ steps.resolve.outputs.system_env }}\`"
            echo "- Verification token: \`${{ steps.get_token.outputs.token != '' && 'set' || 'missing' }}\`"
            echo "- Acknowledge: \`${{ steps.acknowledge.outputs.ack_status }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
