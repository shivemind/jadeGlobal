name: postman-api-catalog

on:
  pull_request:
    paths:
      - "openapi/**"
      - "specs/**"
      - "postman-services.json"
      - ".github/workflows/postman-api-catalog.yml"
  push:
    branches:
      - main
    paths:
      - "openapi/**"
      - "specs/**"
      - "postman-services.json"
      - ".github/workflows/postman-api-catalog.yml"
  workflow_dispatch:
    inputs:
      target_service:
        description: "Optional service_key to process"
        required: false
        type: string

concurrency:
  group: postman-api-catalog-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  checks: write
  pull-requests: write

env:
  MANIFEST_PATH: postman-services.json
  REPORTS_DIR: reports
  POSTMAN_INTEGRATION_BACKEND: bifrost

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.select.outputs.has_changes }}
      matrix: ${{ steps.select.outputs.matrix }}
      dependency_graph: ${{ steps.select.outputs.dependency_graph }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: select
        shell: bash
        run: |
          set -euo pipefail

          test -f "${MANIFEST_PATH}"

          target_service="${{ github.event_name == 'workflow_dispatch' && inputs.target_service || '' }}"
          event_name="${{ github.event_name }}"
          before_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          pr_base_sha="${{ github.event.pull_request.base.sha || '' }}"
          pr_head_sha="${{ github.event.pull_request.head.sha || '' }}"

          dependency_graph="$(jq -c '.dependency_graph' "${MANIFEST_PATH}")"
          echo "dependency_graph=${dependency_graph}" >> "${GITHUB_OUTPUT}"

          all_services="$(jq -c '.services' "${MANIFEST_PATH}")"

          if [[ -n "${target_service}" ]]; then
            filtered="$(jq -c --arg key "${target_service}" '
              map(select(.service_key == $key))
            ' <<<"${all_services}")"
          else
            changed_files=""
            if [[ "${event_name}" == "pull_request" && -n "${pr_base_sha}" && -n "${pr_head_sha}" ]]; then
              changed_files="$(git diff --name-only "${pr_base_sha}" "${pr_head_sha}" || true)"
            elif [[ "${event_name}" == "push" && -n "${before_sha}" && "${before_sha}" != "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff --name-only "${before_sha}" "${head_sha}" || true)"
            fi

            if [[ -z "${changed_files}" ]]; then
              filtered="${all_services}"
            else
              changed_json="$(printf '%s\n' "${changed_files}" | jq -R -s 'split("\n") | map(select(length > 0))')"
              filtered="$(jq -c --argjson changed "${changed_json}" '
                map(
                  . as $service
                  | select($changed | any(. == $service.spec_path))
                )
              ' <<<"${all_services}")"
            fi
          fi

          count="$(jq 'length' <<<"${filtered}")"
          if [[ "${count}" -eq 0 ]]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          echo "matrix=$(jq -c '{include: .}' <<<"${filtered}")" >> "${GITHUB_OUTPUT}"

  spechub_pipeline:
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    outputs:
      system_env: ${{ steps.provision_system_env.outputs.system_env_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Postman CLI
        run: npm install -g postman-cli

      - name: Authenticate Postman CLI
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: postman login --with-api-key "${POSTMAN_API_KEY}"

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}"

      - name: Bootstrap workspace, spec, and collections
        id: bootstrap
        uses: postman-cs/postman-bootstrap-action@v0
        with:
          project-name: ${{ matrix.service_key }}
          domain: ${{ matrix.domain }}
          domain-code: ${{ matrix.domain_code }}
          requester-email: ${{ matrix.requester_email }}
          workspace-admin-user-ids: ${{ vars.POSTMAN_WORKSPACE_ADMIN_USER_IDS }}
          spec-url: ${{ matrix.spec_url }}
          workspace-id: ${{ matrix.workspace_id }}
          spec-id: ${{ matrix.spec_id }}
          baseline-collection-id: ${{ matrix.baseline_collection_id }}
          smoke-collection-id: ${{ matrix.smoke_collection_id }}
          contract-collection-id: ${{ matrix.contract_collection_id }}
          collection-sync-mode: reuse
          integration-backend: ${{ env.POSTMAN_INTEGRATION_BACKEND }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}

      - name: Lint OpenAPI spec
        shell: bash
        run: |
          set -o pipefail
          postman spec lint "${{ matrix.spec_path }}" \
            --fail-severity ERROR \
            --output JSON \
            2>&1 | tee "${REPORTS_DIR}/${{ matrix.service_key }}-lint.txt"

      - name: Run smoke tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          collection_id="${{ matrix.smoke_collection_id }}"
          if [[ -z "${collection_id}" ]]; then
            collection_id="${{ steps.bootstrap.outputs.smoke-collection-id }}"
          fi
          postman collection run "${collection_id}" \
            --env-var "baseUrl=${{ matrix.smoke_base_url }}" \
            --env-var "apiVersion=${{ matrix.version }}" \
            --bail failure \
            --reporters cli,junit,json \
            --reporter-junit-export "${REPORTS_DIR}/${{ matrix.service_key }}-smoke.junit.xml" \
            --reporter-json-export "${REPORTS_DIR}/${{ matrix.service_key }}-smoke.json" \
            2>&1 | tee "${REPORTS_DIR}/${{ matrix.service_key }}-smoke.txt"

      - name: Run contract tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          collection_id="${{ matrix.contract_collection_id }}"
          if [[ -z "${collection_id}" ]]; then
            collection_id="${{ steps.bootstrap.outputs.contract-collection-id }}"
          fi
          postman collection run "${collection_id}" \
            --env-var "baseUrl=${{ matrix.smoke_base_url }}" \
            --env-var "apiVersion=${{ matrix.version }}" \
            --bail failure \
            --reporters cli,junit,json \
            --reporter-junit-export "${REPORTS_DIR}/${{ matrix.service_key }}-contract.junit.xml" \
            --reporter-json-export "${REPORTS_DIR}/${{ matrix.service_key }}-contract.json" \
            2>&1 | tee "${REPORTS_DIR}/${{ matrix.service_key }}-contract.txt"

      - name: Repo sync and publish Spec Hub-backed assets to API catalog
        id: repo_sync
        uses: postman-cs/postman-repo-sync-action@v0
        with:
          project-name: ${{ matrix.service_key }}
          workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}
          spec-id: ${{ steps.bootstrap.outputs.spec-id }}
          baseline-collection-id: ${{ steps.bootstrap.outputs.baseline-collection-id }}
          smoke-collection-id: ${{ steps.bootstrap.outputs.smoke-collection-id }}
          contract-collection-id: ${{ steps.bootstrap.outputs.contract-collection-id }}
          spec-path: ${{ matrix.spec_path }}
          environments-json: ${{ toJSON(matrix.environments) }}
          env-runtime-urls-json: ${{ toJSON(matrix.runtime_urls) }}
          generate-ci-workflow: false
          integration-backend: ${{ env.POSTMAN_INTEGRATION_BACKEND }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-fallback-token: ${{ secrets.GH_FALLBACK_TOKEN }}

      - name: Provision system environment for Insights
        id: provision_system_env
        if: ${{ matrix.enable_insights }}
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          workspace_id="${{ steps.bootstrap.outputs.workspace-id }}"
          prod_env_id="${{ fromJSON(steps.repo_sync.outputs.environment-uids-json).prod }}"
          manifest_system_env="$(jq -r '.system_env // empty' "${MANIFEST_PATH}")"

          if [[ -n "${manifest_system_env}" ]]; then
            echo "Reusing existing system environment: ${manifest_system_env}"
            echo "system_env_id=${manifest_system_env}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Creating system environment for workspace ${workspace_id}..."

          response=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.getpostman.com/detected-apis/system-environments" \
            -H "x-api-key: ${POSTMAN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"Production\",
              \"workspace_id\": \"${workspace_id}\",
              \"environment_id\": \"${prod_env_id}\"
            }")

          http_code=$(echo "${response}" | tail -1)
          body=$(echo "${response}" | sed '$d')

          if [[ "${http_code}" =~ ^2[0-9]{2}$ ]]; then
            sys_env=$(echo "${body}" | jq -r '.id // .data.id // .system_environment.id // empty')
            if [[ -n "${sys_env}" ]]; then
              echo "Created system environment: ${sys_env}"
              echo "system_env_id=${sys_env}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          echo "::warning::System environment API returned ${http_code} — falling back to Insights action auto-provisioning"
          echo "${body}" | head -20
          echo "system_env_id=" >> "${GITHUB_OUTPUT}"

      - name: Insights onboarding
        id: insights
        if: ${{ matrix.enable_insights }}
        uses: postman-cs/postman-insights-onboarding-action@v0
        with:
          project-name: ${{ matrix.service_key }}
          workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}
          environment-id: ${{ fromJSON(steps.repo_sync.outputs.environment-uids-json).prod }}
          cluster-name: ${{ matrix.cluster_name }}
          system-environment-id: ${{ steps.provision_system_env.outputs.system_env_id }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Postman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-${{ matrix.service_key }}-reports
          path: ${{ env.REPORTS_DIR }}
          if-no-files-found: ignore

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "### ${{ matrix.service_name }}"
            echo ""
            echo "- Service key: \`${{ matrix.service_key }}\`"
            echo "- Workspace ID: \`${{ steps.bootstrap.outputs.workspace-id }}\`"
            echo "- Spec ID: \`${{ steps.bootstrap.outputs.spec-id }}\`"
            echo "- Baseline collection ID: \`${{ steps.bootstrap.outputs.baseline-collection-id }}\`"
            echo "- Smoke collection ID: \`${{ steps.bootstrap.outputs.smoke-collection-id }}\`"
            echo "- Contract collection ID: \`${{ steps.bootstrap.outputs.contract-collection-id }}\`"
            echo "- Repo sync commit: \`${{ steps.repo_sync.outputs.commit-sha }}\`"
            echo "- Insights enabled: \`${{ matrix.enable_insights }}\`"
            echo "- Cluster: \`${{ matrix.cluster_name }}\`"
            echo "- System env: \`${{ steps.provision_system_env.outputs.system_env_id || 'auto-provisioned by action' }}\`"
            echo "- Insights output: \`${{ steps.insights.outputs.system-env-id || steps.insights.outputs.system_env || 'see action logs' }}\`"
            echo "- Dependencies: \`${{ toJSON(matrix.dependencies) }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Export Insights outputs
        if: ${{ matrix.enable_insights }}
        id: insights_export
        shell: bash
        run: |
          sys_env="${{ steps.provision_system_env.outputs.system_env_id }}"
          if [[ -z "${sys_env}" ]]; then
            sys_env="${{ steps.insights.outputs.system-env-id || steps.insights.outputs.system_env || '' }}"
          fi
          echo "system_env_id=${sys_env}" >> "${GITHUB_OUTPUT}"
          echo "prod_env_id=${{ fromJSON(steps.repo_sync.outputs.environment-uids-json).prod }}" >> "${GITHUB_OUTPUT}"
          echo "stage_env_id=${{ fromJSON(steps.repo_sync.outputs.environment-uids-json).stage }}" >> "${GITHUB_OUTPUT}"

  persist_ids:
    needs: [plan, spechub_pipeline]
    if: needs.plan.outputs.has_changes == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_FALLBACK_TOKEN }}

      - name: Persist system environment and IDs to manifest
        shell: bash
        run: |
          set -euo pipefail

          sys_env="${{ needs.spechub_pipeline.outputs.system_env }}"

          if [[ -z "${sys_env}" ]]; then
            echo "No system_env to persist — skipping"
            exit 0
          fi

          current="$(jq -r '.system_env // empty' "${MANIFEST_PATH}")"
          if [[ "${current}" == "${sys_env}" ]]; then
            echo "system_env already up to date: ${sys_env}"
            exit 0
          fi

          echo "Persisting system_env=${sys_env} to manifest and environment files..."

          jq --arg env "${sys_env}" '.system_env = $env' "${MANIFEST_PATH}" > tmp.json && mv tmp.json "${MANIFEST_PATH}"

          for env_file in postman/environments/*.postman_environment.json; do
            has_key=$(jq '[.values[] | select(.key == "POSTMAN_INSIGHTS_SYSTEM_ENV")] | length' "${env_file}")
            if [[ "${has_key}" -gt 0 ]]; then
              jq --arg env "${sys_env}" '
                .values |= map(if .key == "POSTMAN_INSIGHTS_SYSTEM_ENV" then .value = $env else . end)
              ' "${env_file}" > tmp.json && mv tmp.json "${env_file}"
            fi
          done

          if [[ -f postman/globals/workspace.globals.yaml ]]; then
            sed -i "s|value: .*# system_env|value: ${sys_env} # system_env|" postman/globals/workspace.globals.yaml 2>/dev/null || true
          fi

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST_PATH}" postman/environments/ postman/globals/
          git commit -m "chore: persist system_env ${sys_env} from Insights onboarding"
          git push

  validate_dependency_graph:
    needs: [plan, spechub_pipeline]
    if: needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate dependency graph completeness
        shell: bash
        run: |
          set -euo pipefail

          echo "## Dependency Graph Validation" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          system_env="${{ needs.spechub_pipeline.outputs.system_env }}"
          if [[ -z "${system_env}" ]]; then
            echo "- :warning: **system_env not yet provisioned** — will be created by Insights onboarding action on first run" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "- :white_check_mark: system_env: \`${system_env}\`" >> "${GITHUB_STEP_SUMMARY}"
          fi

          graph='${{ needs.plan.outputs.dependency_graph }}'
          edge_count=$(echo "${graph}" | jq '.edges | length')
          echo "- Dependency edges defined: **${edge_count}**" >> "${GITHUB_STEP_SUMMARY}"

          echo "${graph}" | jq -r '.edges[] | "- \(.from) → \(.to): _\(.relationship)_"' >> "${GITHUB_STEP_SUMMARY}"

          all_services=$(jq -r '.services[].service_key' "${MANIFEST_PATH}")
          insights_count=0
          total_count=0
          for svc in ${all_services}; do
            total_count=$((total_count + 1))
            enabled=$(jq -r --arg key "${svc}" '.services[] | select(.service_key == $key) | .enable_insights' "${MANIFEST_PATH}")
            cluster=$(jq -r --arg key "${svc}" '.services[] | select(.service_key == $key) | .cluster_name' "${MANIFEST_PATH}")
            if [[ "${enabled}" == "true" ]]; then
              insights_count=$((insights_count + 1))
              echo "- :white_check_mark: \`${svc}\` — Insights enabled, cluster: \`${cluster}\`" >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "- :x: \`${svc}\` — Insights **disabled**" >> "${GITHUB_STEP_SUMMARY}"
            fi
          done

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**${insights_count}/${total_count}** services onboarded to Insights" >> "${GITHUB_STEP_SUMMARY}"

          for svc in ${all_services}; do
            deps=$(jq -r --arg key "${svc}" '.services[] | select(.service_key == $key) | .dependencies[]?' "${MANIFEST_PATH}")
            for dep in ${deps}; do
              dep_exists=$(jq -r --arg key "${dep}" '.services[] | select(.service_key == $key) | .service_key' "${MANIFEST_PATH}")
              if [[ -z "${dep_exists}" ]]; then
                echo "::error::Service ${svc} declares dependency on ${dep} which is not in the manifest"
                exit 1
              fi
              dep_insights=$(jq -r --arg key "${dep}" '.services[] | select(.service_key == $key) | .enable_insights' "${MANIFEST_PATH}")
              if [[ "${dep_insights}" != "true" ]]; then
                echo "::warning::Dependency ${dep} (required by ${svc}) does not have Insights enabled — graph edge will be missing"
              fi
            done
          done
